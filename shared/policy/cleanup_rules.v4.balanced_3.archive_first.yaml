schema_id: cleanup-policy
schema_version: v1.1
policy_id: cleanup_rules.v4.balanced_3.archive_first

rules:
  - id: guard.no_delete.repo_critical_paths
    action: NOOP
    risk_bucket: C
    path_globs:
      - .gitignore
      - README.md
      - pyproject.toml
      - config.v1.yaml
      - shared/**
      - core/**
      - api/**
      - tools/**
      - tests/**
    notes: "Protect critical repo/system files."

  - id: guard.no_delete.vcs_and_env_dirs
    action: NOOP
    risk_bucket: C
    path_globs:
      - .git/**
      - .venv/**
      - venv/**
    notes: "Never touch VCS or env directories."

  - id: junk.delete.temp_logs.allowed_scopes
    action: ARCHIVE
    risk_bucket: B
    scopes: [project]
    path_globs:
      - tmp/*.tmp
      - tmp/**/*.tmp
      - tmp/*.log
      - tmp/**/*.log
      - out/*.tmp
      - out/**/*.tmp
      - out/*.log
      - out/**/*.log
      - eii_engine/out/*.tmp
      - eii_engine/out/**/*.tmp
      - eii_engine/out/*.log
      - eii_engine/out/**/*.log
      - agent/runs/**/*.tmp
      - agent/runs/**/*.log
    notes: "Temporary files and logs should be archived first."

  - id: junk.delete.pycache.dirs.allowed_scopes
    action: ARCHIVE
    risk_bucket: B
    scopes: [project]
    path_globs:
      - __pycache__/**
      - "**/__pycache__/**"
    notes: "Archive python cache directories (including root-level __pycache__)."

  - id: junk.delete.pyc.files.allowed_scopes
    action: ARCHIVE
    risk_bucket: B
    scopes: [project]
    path_globs:
      - __pycache__/**/*.pyc
      - "**/__pycache__/**/*.pyc"
    exts: [.pyc]
    notes: "Archive compiled python artifacts."

  - id: junk.delete.tool_caches.allowed_scopes
    action: ARCHIVE
    risk_bucket: B
    scopes: [project]
    path_globs:
      - .pytest_cache/**
      - .mypy_cache/**
      - .ruff_cache/**
    notes: "Archive tool caches."

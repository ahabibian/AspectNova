name: DV Gate

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  gate:
    name: dv-gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .\agent

      - name: Run Data Verdict pipeline
        shell: pwsh
        run: |
          $env:PYTHONPATH = "agent/src"
          python -m dv run --workspace "."

      - name: Upload DV artifact zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dv-artifact-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            runs/artifacts/*.zip

      - name: Upload DV run outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dv-run-output-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            runs/*/output/*.json
            runs/*/output/*.md

  report_status:
    name: report-dv-status
    runs-on: ubuntu-latest
    needs: [gate]
    if: always()

    steps:
      - name: Set DV status context on commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RESULT: ${{ needs.gate.result }}
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE="success"
            DESC="DV Gate passed"
          else
            STATE="failure"
            DESC="DV Gate failed"
          fi

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/statuses/$SHA" \
            -d "{\"state\":\"$STATE\",\"context\":\"dv-gate\",\"description\":\"$DESC\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
